# Shell / bar (managed by shell-switcher)
exec-once = ~/.dotfiles/shell-switcher/start-shell.sh

# Hyprpaper wallpaper daemon
exec-once = hyprpaper

# Polkit agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard manager
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# GTK settings portal
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = /usr/lib/xdg-desktop-portal

# Apply GTK theme via gsettings
exec-once = gsettings set org.gnome.desktop.interface gtk-theme     "catppuccin-macchiato-mauve-standard+default"
exec-once = gsettings set org.gnome.desktop.interface color-scheme  "prefer-dark"
exec-once = gsettings set org.gnome.desktop.interface cursor-theme  "catppuccin-macchiato-dark-cursors"
exec-once = gsettings set org.gnome.desktop.interface cursor-size   24
exec-once = gsettings set org.gnome.desktop.interface icon-theme    "Papirus-Dark"
