# ── General ────────────────────────────────────────────────────────────────
windowrule {
    name  = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name     = fix-xwayland-drag
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false
    no_focus = true
}

# ── Floating apps ──────────────────────────────────────────────────────────
windowrule {
    name  = float-pavucontrol
    match:class = pavucontrol
    float = true
    size  = 800 600
    center = true
}

windowrule {
    name  = float-nm
    match:class = nm-connection-editor
    float = true
    center = true
}

windowrule {
    name  = float-calculator
    match:class = org.kde.kcalc
    float = true
    size  = 400 600
    center = true
}

windowrule {
    name  = float-qt-dialogs
    match:title = ^(Open|Save|Save As|Choose).*$
    float  = true
    center = true
}

# ── Blur overrides (transparent terminals / apps) ──────────────────────────
windowrule {
    name  = kitty-opacity
    match:class = kitty
    opacity = 0.92 0.85
}

# ── Hyprland-run popup ─────────────────────────────────────────────────────
windowrule {
    name  = move-hyprland-run
    match:class = hyprland-run
    move  = 20 monitor_h-120
    float = yes
}
