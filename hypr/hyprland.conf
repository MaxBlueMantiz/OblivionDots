# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Hyprland config — Catppuccin Macchiato                                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝

source = ~/.config/hypr/modules/colors.conf
source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/input.conf
source = ~/.config/hypr/modules/decoration.conf
source = ~/.config/hypr/modules/animations.conf
source = ~/.config/hypr/modules/keybinds.conf
source = ~/.config/hypr/modules/windowrules.conf

################
### MONITORS ###
################
monitor = ,preferred,auto,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 6
    gaps_out = 12

    border_size = 2

    col.active_border   = $mauve $blue 45deg
    col.inactive_border = $surface1

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
}

#############
### CURSOR ###
#############

cursor {
    inactive_timeout = 5
}
